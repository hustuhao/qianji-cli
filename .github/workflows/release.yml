name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all platforms
        env:
          CGO_ENABLED: 0
        run: |
          platforms=("linux_amd64" "linux_arm64" "darwin_amd64" "darwin_arm64" "windows_amd64" "windows_arm64")
          for p in "${platforms[@]}"; do
            GOOS=${p%_*}
            GOARCH=${p#*_}
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            NAME="qianji_${GOOS}_${GOARCH}${EXT}"
            echo "Building $NAME..."
            go build -ldflags="-s -w" -o "$NAME" ./cmd/qianji
            tar -czf "qianji_${GOOS}_${GOARCH}.tar.gz" "$NAME"
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: qianji_*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
